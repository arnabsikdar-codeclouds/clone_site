<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiteCloner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-mesh"></div>

    <div class="container">
        <header>
            <div class="logo">
                <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                    <rect width="36" height="36" rx="10" fill="url(#logo-grad)"/>
                    <path d="M10 18L15 13V16H22V13L27 18L22 23V20H15V23L10 18Z" fill="white" opacity="0.9"/>
                    <defs>
                        <linearGradient id="logo-grad" x1="0" y1="0" x2="36" y2="36">
                            <stop stop-color="#6366f1"/>
                            <stop offset="1" stop-color="#8b5cf6"/>
                        </linearGradient>
                    </defs>
                </svg>
                <div class="logo-text">
                    <h1>SiteCloner</h1>
                    <p class="subtitle">Clone any website for offline browsing</p>
                </div>
            </div>
        </header>

        <section class="clone-form">
            <div class="input-group">
                <div class="input-wrapper">
                    <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                    </svg>
                    <input type="url" id="url-input" placeholder="https://example.com" autocomplete="url" spellcheck="false">
                </div>
                <button id="clone-btn" onclick="startClone()">
                    <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    <span>Clone</span>
                </button>
            </div>
            <div class="options">
                <label>
                    <span class="option-label">Max depth</span>
                    <input type="number" id="max-depth" value="10" min="1" max="50">
                </label>
                <label>
                    <span class="option-label">Max pages</span>
                    <input type="number" id="max-pages" value="500" min="1" max="5000">
                </label>
            </div>
        </section>

        <section id="progress-section" class="progress-section hidden">
            <div class="section-header">
                <h2>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
                    </svg>
                    Progress
                </h2>
                <span id="status-badge" class="badge">Starting</span>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon pages-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
                        </svg>
                    </div>
                    <div class="stat-data">
                        <span class="stat-value" id="pages-count">0</span>
                        <span class="stat-label">Pages</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon assets-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
                        </svg>
                    </div>
                    <div class="stat-data">
                        <span class="stat-value" id="assets-count">0</span>
                        <span class="stat-label">Assets</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon errors-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
                        </svg>
                    </div>
                    <div class="stat-data">
                        <span class="stat-value" id="errors-count">0</span>
                        <span class="stat-label">Errors</span>
                    </div>
                </div>
            </div>

            <div class="progress-track">
                <div class="progress-bar" id="progress-bar">
                    <div class="progress-glow"></div>
                </div>
                <span class="progress-pct" id="progress-pct">0%</span>
            </div>

            <div class="log-container">
                <div class="log-header">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
                    </svg>
                    <span>Activity log</span>
                </div>
                <div id="event-log" class="event-log"></div>
            </div>
        </section>

        <section class="history-section">
            <div class="section-header">
                <h2>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                    </svg>
                    History
                </h2>
            </div>
            <div id="job-list" class="job-list">
                <div class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
                        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/>
                    </svg>
                    <p>No cloned sites yet</p>
                    <span>Enter a URL above to get started</span>
                </div>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
